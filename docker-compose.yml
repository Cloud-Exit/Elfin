services:
  # LLM inference — Gemma 4 E4B (OpenAI-compatible API)
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server@sha256:d4ad514993d6b77e09acc3f19c93401366af13c1a2474ae752748ddbfec399e7
    ports:
      - "8081:8081"
    volumes:
      - ./data/models:/models:ro
    command: >
      -m /models/${CHAT_MODEL:-gemma-4-E4B-it-Q5_K_M.gguf}
      --mmproj /models/${CHAT_MMPROJ:-mmproj-F16.gguf}
      --port 8081
      --host 0.0.0.0
      -c ${CHAT_CTX_SIZE:-8192}
      -ngl 0
    restart: unless-stopped

  # Embedding model — nomic-embed-text (OpenAI-compatible API)
  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server@sha256:d4ad514993d6b77e09acc3f19c93401366af13c1a2474ae752748ddbfec399e7
    ports:
      - "8082:8082"
    volumes:
      - ./data/models:/models:ro
    command: >
      -m /models/${EMBED_MODEL:-nomic-embed-text-v1.5.Q8_0.gguf}
      --port 8082
      --host 0.0.0.0
      -c ${EMBED_CTX_SIZE:-8192}
      --embedding
      -ngl 0
    restart: unless-stopped

  # Vector database (on-disk storage mode)
  qdrant:
    image: docker.io/qdrant/qdrant:latest@sha256:94728574965d17c6485dd361aa3c0818b325b9016dac5ea6afec7b4b2700865f
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    restart: unless-stopped

  # Kiwix — offline encyclopedia server
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest@sha256:0b6541355b250c6b45d2d7725e88f22f1d6a0f45ad9480d9c0bd4bc58436a12f
    ports:
      - "8083:8080"
    volumes:
      - ./data/datasets/zim:/data:ro
    command: /data/*.zim
    restart: unless-stopped
