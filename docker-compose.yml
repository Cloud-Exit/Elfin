services:
  # LLM inference (OpenAI-compatible API)
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8081:8081"
    volumes:
      - ./data/models:/models:ro
    command: >
      -m /models/${CHAT_MODEL:-gemma-4-e4b-it-Q4_K_M.gguf}
      --port 8081
      --host 0.0.0.0
      -c ${CHAT_CTX_SIZE:-8192}
      -ngl 0
    restart: unless-stopped

  # Embedding model (OpenAI-compatible API)
  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8082:8082"
    volumes:
      - ./data/models:/models:ro
    command: >
      -m /models/${EMBED_MODEL:-nomic-embed-text-v1.5.Q8_0.gguf}
      --port 8082
      --host 0.0.0.0
      -c ${EMBED_CTX_SIZE:-8192}
      --embedding
      -ngl 0
    restart: unless-stopped

  # Vector database (on-disk storage mode)
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    restart: unless-stopped

  # Open WebUI (auto-connects to llama-server)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URLS=http://llama-server:8081/v1
      - OPENAI_API_KEYS=not-needed
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
    depends_on:
      - llama-server
    restart: unless-stopped
